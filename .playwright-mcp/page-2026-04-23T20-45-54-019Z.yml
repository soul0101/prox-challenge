              - paragraph [ref=e115]:
                - text: What you're looking at is
                - strong [ref=e116]: classic gas porosity
                - text: . The surface of the bead is pitted with small round holes where atmospheric gas (nitrogen / oxygen / water vapour) got into the molten puddle before it had time to solidify — see the defect photo on
                - strong [ref=e117]: p.37
                - text: of the owner's manual, which shows exactly this pattern and labels it
                - emphasis [ref=e118]: porosity
                - text: .
              - paragraph [ref=e119]: "Five causes in order of likelihood for what I can see in your photo:"
              - list [ref=e120]:
                - listitem [ref=e121]:
                  - strong [ref=e122]: Not enough shielding gas at the puddle.
                  - text: On a 75/25 Ar/CO₂ setup for MIG,
                  - strong [ref=e123]: p.36
                  - text: calls for 20–25 CFH at the regulator for still-air conditions. Check the flowmeter ball is sitting in that band
                  - emphasis [ref=e124]: during
                  - text: the weld, not at idle — a collapsed ball on arc-start means a regulator or hose issue.
                - listitem [ref=e125]:
                  - strong [ref=e126]: Wind or a fan blowing across the puddle.
                  - text: Even a gentle breeze across the nozzle strips the gas shield clean off the weld. If you're in an open garage, shut the door, move the weld 10 feet from any fan, or tent it.
                - listitem [ref=e127]:
                  - strong [ref=e128]: Contaminated base metal.
                  - text: Rust, mill scale, oil, paint, galvanising — all of these boil off as gas under the arc and end up trapped in the bead. Hit the joint with a flap disc or wire brush down to bright metal about ½″ either side of the seam before you strike the arc again.
                - listitem [ref=e129]:
                  - strong [ref=e130]: Spattered gas nozzle.
                  - text: A nozzle caked with spatter has a turbulent gas flow that doesn't shield properly. Ream it out with a nozzle cleaner and touch up with anti-spatter spray.
                - listitem [ref=e131]:
                  - strong [ref=e132]: Gas hose or O-ring leak.
                  - text: Pinhole leaks in the torch hose or a cracked O-ring at the regulator pulls air into the shielding gas inline with the flow. Swap the hose or spray the fittings with soapy water and look for bubbles with the valve open.
              - paragraph [ref=e133]: "Work through those in order — the fix is usually #1, #2, or #3. If the bead still looks like the photo after a fresh grind, fresh gas check, and no draft, then it's worth pulling the torch apart to inspect the liner and O-rings."
              - paragraph [ref=e134]: After each change, lay a 2-inch practice bead on clean scrap and look for the bubbles. A clean bead under the same settings means the last thing you changed was the culprit.
