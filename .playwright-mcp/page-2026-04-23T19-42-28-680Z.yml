              - paragraph [ref=e996]:
                - text: The artifact on the right overlays 13 numbered pins on the real front-panel diagram from
                - strong [ref=e997]: p.8
                - text: — one per callout on the manual's Front Panel Controls page. Hover a pin or a description to highlight the counterpart.
              - paragraph [ref=e998]: "The controls, grouped by region:"
              - list [ref=e999]:
                - listitem [ref=e1000]:
                  - strong [ref=e1001]: LCD Display
                  - text: — the single source of truth for what the machine is about to do. Shows the selected process, wire diameter, live voltage, live wire-feed speed, and the detected input voltage (120 V or 240 V) on every boot. The active function above each knob updates live as you move through menus.
                - listitem [ref=e1002]:
                  - strong [ref=e1003]: Home Button
                  - text: and
                  - strong [ref=e1004]: Back Button
                  - text: — menu navigation. Home returns you to the main process-select screen; Back steps one level up in whichever submenu you're in.
                - listitem [ref=e1005]:
                  - strong [ref=e1006]: Left Knob
                  - text: ","
                  - strong [ref=e1007]: Control Knob
                  - text: ", and"
                  - strong [ref=e1008]: Right Knob
                  - text: — three dials whose meaning depends on the current screen. On the main screen, typically voltage and wire-feed speed on the outer knobs; inside submenus, parameter values. The Control Knob in the middle doubles as a push-to-click confirm.
                - listitem [ref=e1009]:
                  - strong [ref=e1010]: Power Switch
                  - text: — rocker on the upper right of the faceplate. The machine re-detects input voltage on every power-on.
                - listitem [ref=e1011]:
                  - strong [ref=e1012]: Negative Socket
                  - text: and
                  - strong [ref=e1013]: Positive Socket
                  - text: — DCEN and DCEP output terminals. Which one your torch vs. ground clamp plug into depends on the process; the polarity setup lives on
                  - strong [ref=e1014]: p.13
                  - text: . The single most common "my machine suddenly welds badly" cause is forgetting to swap these after a process change.
                - listitem [ref=e1015]:
                  - strong [ref=e1016]: MIG Gun / Spool Gun Cable Socket
                  - text: — one Euro-style plug carries welding current, trigger pilot, and shielding gas to the gun. Used for both the standard MIG gun and the optional Spool Gun.
                - listitem [ref=e1017]:
                  - strong [ref=e1018]: Spool Gun Gas Outlet
                  - text: — separate gas port that the optional Spool Gun's gas hose connects to when you're running with it.
                - listitem [ref=e1019]:
                  - strong [ref=e1020]: Wire Feed Power Cable
                  - text: — internal power cable running from the control board to the wire-feed drive rolls. Exits the faceplate on the left.
                - listitem [ref=e1021]:
                  - strong [ref=e1022]: Storage Compartment
                  - text: — recessed cubby on the lower right for spare tips, a nozzle cleaner, a drive-roll spanner — the small things you reach for every five minutes.
              - paragraph [ref=e1023]: Click any row in the description list to flash the matching pin on the image.
