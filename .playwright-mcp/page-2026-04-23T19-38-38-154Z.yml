                - paragraph [ref=e129]: "What the four bead states look like in real life (bottom of the artifact panel, with the manual's weld-quality references on p.37 as the ground truth):"
                - list [ref=e130]:
                  - listitem [ref=e131]:
                    - strong [ref=e132]: Too cold
                    - text: — bead sits on top of the parent metal like a rope; the edges don't wet in. Caused by WFS too low for the voltage. Fusion risk — the bead looks fine cosmetically and pops off on the first hammer tap.
                  - listitem [ref=e133]:
                    - strong [ref=e134]: Good
                    - text: — even convex profile, clean wetting, consistent ripples. Stable
                    - emphasis [ref=e135]: frying-bacon
                    - text: arc sound.
                  - listitem [ref=e136]:
                    - strong [ref=e137]: Running hot (mild)
                    - text: — bead gets flatter, ripples stretch out. Arc is harsher but the weld is still sound; usually an accepted operating point if you need a bit more penetration.
                  - listitem [ref=e138]:
                    - strong [ref=e139]: Too hot
                    - text: — wide, flat bead with undercut along the toes, occasional burnback popping at the tip. Caused by WFS too high for the voltage — wire is outrunning the arc.
                - paragraph [ref=e140]:
                  - text: A reasonable
                  - strong [ref=e141]: starting point
                  - text: for this joint is
                  - strong [ref=e142]: 18.5 V / 340 ipm
                  - text: — straight in the centre of the envelope per p.27. Run a 3-inch bead on scrap first, then fine-tune ± 0.5 V / ± 20 ipm based on the sound and the profile.
