<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 500" role="img" aria-labelledby="t">
  <title id="t">Ingest pipeline — the PDF is read once by vision, turned into structured records and a search index, and committed to the repo.</title>

  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", Helvetica, Arial, sans-serif; }
      .title-lg  { font-weight: 600; font-size: 19px; letter-spacing: 0.005em; }
      .head      { font-weight: 600; font-size: 15px; }
      .subhead   { font-weight: 600; font-size: 13px; }
      .body      { font-size: 12.5px; opacity: 0.82; }
      .caption   { font-size: 11.5px; opacity: 0.58; }
      .kbd       { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 11.5px; }
      .badge     { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }

      .fg         { fill: #111827; }
      .fg-muted   { fill: #4b5563; }
      .card       { fill: rgba(130,130,130,0.055); stroke: rgba(130,130,130,0.28); stroke-width: 1; }
      .card-accent{ fill: rgba(234,88,12,0.07);    stroke: rgba(234,88,12,0.5);    stroke-width: 1; }
      .chip       { fill: rgba(130,130,130,0.09);  stroke: rgba(130,130,130,0.3);  stroke-width: 1; }
      .accent     { fill: #ea580c; }
      .tick       { fill: rgba(234,88,12,0.9); }
      .line       { stroke: rgba(130,130,130,0.65); fill: none; stroke-width: 1.25; }
      .divider    { stroke: rgba(130,130,130,0.22); fill: none; stroke-width: 1; }

      @media (prefers-color-scheme: dark) {
        .fg       { fill: #f3f4f6; }
        .fg-muted { fill: #9ca3af; }
      }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(130,130,130,0.9)"/>
    </marker>
  </defs>

  <!-- ═════════ TITLE ═════════ -->
  <text x="60" y="46" class="label fg title-lg">The ingest pipeline</text>
  <text x="60" y="70" class="label fg-muted body">Runs once per PDF · incremental by content hash · output is static files committed to the repo.</text>

  <!--
    ═════════ PIPELINE ROW ═════════
    5 boxes, 180 wide × 200 tall, centered in a 1280 canvas.
      5 × 180 = 900
      4 gaps × 40 = 160
      total width = 1060, left margin = (1280 − 1060) / 2 = 110
      box y = 110 → 310 (center 210)
      arrow captions y = 328
    Box centers: 200, 420, 640, 860, 1080
    Box edges:   110-290, 330-510, 550-730, 770-950, 990-1170
    Gaps:        290-330, 510-550, 730-770, 950-990   (centers 310, 530, 750, 970)
  -->

  <!-- ───── 1. PDF ───── -->
  <g transform="translate(110,110)">
    <rect width="180" height="200" rx="14" class="card"/>
    <!-- document icon, centered -->
    <g transform="translate(66,24)" class="line" stroke-linejoin="round" stroke-linecap="round" fill="rgba(130,130,130,0.07)">
      <path d="M0,0 L32,0 L48,16 L48,62 L0,62 Z"/>
      <path d="M32,0 L32,16 L48,16"/>
      <line x1="8"  y1="28" x2="40" y2="28"/>
      <line x1="8"  y1="38" x2="40" y2="38"/>
      <line x1="8"  y1="48" x2="30" y2="48"/>
    </g>
    <line x1="24" y1="108" x2="156" y2="108" class="divider"/>
    <text x="90" y="130" class="label fg head"    text-anchor="middle">PDF</text>
    <text x="90" y="150" class="label fg-muted caption" text-anchor="middle">any technical manual</text>
    <text x="90" y="174" class="label fg-muted kbd"     text-anchor="middle">owner-manual.pdf</text>
    <text x="90" y="190" class="label fg-muted kbd"     text-anchor="middle">selection-chart.pdf</text>
  </g>

  <!-- ───── 2. Page renders ───── -->
  <g transform="translate(330,110)">
    <rect width="180" height="200" rx="14" class="card"/>
    <!-- stacked pages icon, centered. Tallest stack 72 wide × 76 tall; center x = 54. -->
    <g transform="translate(54,24)" class="line" stroke-linejoin="round" fill="rgba(130,130,130,0.07)">
      <rect x="16" y="14" width="56" height="68" rx="4"/>
      <rect x="8"  y="7"  width="56" height="68" rx="4"/>
      <rect x="0"  y="0"  width="56" height="68" rx="4"/>
      <g opacity="0.5" stroke-width="0.9">
        <line x1="8"  y1="14" x2="48" y2="14"/>
        <line x1="8"  y1="22" x2="48" y2="22"/>
        <line x1="8"  y1="30" x2="36" y2="30"/>
        <line x1="8"  y1="38" x2="42" y2="38"/>
      </g>
    </g>
    <line x1="24" y1="108" x2="156" y2="108" class="divider"/>
    <text x="90" y="130" class="label fg head"         text-anchor="middle">Page renders</text>
    <text x="90" y="150" class="label fg-muted caption" text-anchor="middle">pdfjs + canvas</text>
    <text x="90" y="174" class="label fg-muted body"    text-anchor="middle">one PNG per page,</text>
    <text x="90" y="190" class="label fg-muted body"    text-anchor="middle">at display resolution</text>
  </g>

  <!-- ───── 3. Vision pass (accent) ───── -->
  <g transform="translate(550,110)">
    <rect width="180" height="200" rx="14" class="card-accent"/>
    <!-- "eye" icon, centered. Outer shape 64 × 36; inner iris r=8. Center of icon x = 32. -->
    <g transform="translate(58,34)" fill="none" stroke-width="1.6" stroke="rgba(234,88,12,0.9)" stroke-linejoin="round" stroke-linecap="round">
      <path d="M0,20 C14,0  50,0  64,20  C50,40  14,40  0,20 Z"/>
      <circle cx="32" cy="20" r="10" fill="rgba(234,88,12,0.18)"/>
      <circle cx="32" cy="20" r="4"  fill="rgba(234,88,12,0.95)" stroke="none"/>
    </g>
    <line x1="24" y1="108" x2="156" y2="108" class="divider" style="stroke: rgba(234,88,12,0.3);"/>
    <text x="90" y="130" class="label fg head"      text-anchor="middle">Vision pass</text>
    <!-- Opus badge -->
    <g transform="translate(44,140)">
      <rect width="92" height="20" rx="10" fill="rgba(234,88,12,0.14)" stroke="rgba(234,88,12,0.6)" stroke-width="1"/>
      <text x="46" y="14" class="label accent badge" text-anchor="middle">claude opus</text>
    </g>
    <text x="90" y="182" class="label fg-muted caption" text-anchor="middle">reads each page</text>
    <text x="90" y="196" class="label fg-muted caption" text-anchor="middle">as an image, not text</text>
  </g>

  <!-- ───── 4. Per-page record ───── -->
  <g transform="translate(770,110)">
    <rect width="180" height="200" rx="14" class="card"/>
    <text x="90" y="34" class="label fg head" text-anchor="middle">Per-page record</text>
    <text x="90" y="52" class="label fg-muted caption" text-anchor="middle">structured · cached to disk</text>
    <line x1="24" y1="70" x2="156" y2="70" class="divider"/>

    <!-- bullet list. ticks centered vertically on the text baseline. -->
    <g transform="translate(22,88)" class="label fg-muted body">
      <g>                          <circle class="tick" cx="4" cy="-4" r="2.5"/><text x="14" y="0">summary</text></g>
      <g transform="translate(0,20)"><circle class="tick" cx="4" cy="-4" r="2.5"/><text x="14" y="0">figures + captions</text></g>
      <g transform="translate(0,40)"><circle class="tick" cx="4" cy="-4" r="2.5"/><text x="14" y="0">tables + cells</text></g>
      <g transform="translate(0,60)"><circle class="tick" cx="4" cy="-4" r="2.5"/><text x="14" y="0">6–15 keywords</text></g>
      <g transform="translate(0,80)"><circle class="tick" cx="4" cy="-4" r="2.5"/><text x="14" y="0">kinds · section hint</text></g>
      <g transform="translate(0,100)"><circle class="tick" cx="4" cy="-4" r="2.5"/><text x="14" y="0">is_mostly_visual</text></g>
    </g>
  </g>

  <!-- ───── 5. Ready ───── -->
  <g transform="translate(990,110)">
    <rect width="180" height="200" rx="14" class="card"/>
    <text x="90" y="34" class="label fg head" text-anchor="middle">Ready</text>
    <text x="90" y="52" class="label fg-muted caption" text-anchor="middle">committed to the repo</text>
    <line x1="24" y1="70" x2="156" y2="70" class="divider"/>

    <!-- output chips -->
    <g transform="translate(20,86)">
      <rect width="140" height="28" rx="8" class="chip"/>
      <text x="70" y="18" class="label fg body" text-anchor="middle">BM25 index</text>
    </g>
    <g transform="translate(20,122)">
      <rect width="140" height="28" rx="8" class="chip"/>
      <text x="70" y="18" class="label fg body" text-anchor="middle">document outline</text>
    </g>
    <g transform="translate(20,158)">
      <rect width="140" height="28" rx="8" class="chip"/>
      <text x="70" y="18" class="label fg body" text-anchor="middle">suggested prompts</text>
    </g>
  </g>

  <!-- ═════════ ARROWS between stages (y = 210, center of boxes) ═════════ -->
  <g class="line" marker-end="url(#arrow)">
    <line x1="292" y1="210" x2="326" y2="210"/>
    <line x1="512" y1="210" x2="546" y2="210"/>
    <line x1="732" y1="210" x2="766" y2="210"/>
    <line x1="952" y1="210" x2="986" y2="210"/>
  </g>

  <!-- Arrow captions, centered in each gap (gap centers: 310, 530, 750, 970), below the arrows. -->
  <g class="label fg-muted caption" text-anchor="middle">
    <text x="310" y="334">per page</text>
    <text x="530" y="334">→ JSON</text>
    <text x="750" y="334">consolidate</text>
    <text x="970" y="334">ship</text>
  </g>

  <!-- ═════════ FOOTER BAR ═════════ -->
  <g transform="translate(110,382)">
    <rect width="1060" height="94" rx="12" class="card"/>
    <text x="24" y="30" class="label fg head">Why this matters at answer time</text>
    <text x="24" y="54" class="label fg-muted body">At query time the agent never re-parses a PDF. Retrieval runs over the cached metadata, and when the model needs to <tspan class="fg" font-weight="600">see</tspan> a page,</text>
    <text x="24" y="74" class="label fg-muted body">the PNG is loaded back into context through <tspan class="kbd fg" font-weight="600">open_page</tspan>. Expensive vision runs once at ingest, exactly when the output is worth caching.</text>
  </g>
</svg>
